    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      frame-src allows embedding the user's local dev server (the Playground live
      preview) — ports are dynamic (vite 5173+, storybook 6006, …), so loopback
      hosts are wildcarded by port. Everything else stays locked to 'self'.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; frame-src 'self' http://localhost:* http://127.0.0.1:* https://localhost:* https://127.0.0.1:*;"
    />
