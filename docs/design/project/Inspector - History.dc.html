<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous">
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&amp;family=Geist+Mono:wght@400;500&amp;display=swap" rel="stylesheet">
  <style>
    html, body { margin:0; padding:0; background:#0B0C0E; }
    * { box-sizing:border-box; }
    @keyframes vsToastIn { from { transform:translateY(12px); opacity:0; } to { transform:translateY(0); opacity:1; } }
    ::-webkit-scrollbar { width:10px; height:10px; }
    ::-webkit-scrollbar-thumb { background:#26282D; border-radius:8px; border:2px solid #0B0C0E; }
    ::-webkit-scrollbar-track { background:transparent; }
  </style>
</helmet>

<div data-screen-label="Inspector — History" style="display:flex; width:100%; height:100vh; min-height:720px; background:#0B0C0E; color:#E7E9EC; font-family:'Geist',system-ui,sans-serif; font-size:13px; overflow:hidden;">

  <!-- ============ LEFT RAIL ============ -->
  <nav style="width:220px; flex:none; background:#141518; border-right:1px solid #26282D; display:flex; flex-direction:column; padding:16px 12px 12px;">
    <a href="Projects Dashboard.dc.html" title="All projects" style="display:flex; align-items:center; gap:8px; padding:0 8px 16px; border-bottom:1px solid #26282D; margin-bottom:12px; text-decoration:none; color:inherit; border-radius:6px;" style-hover="opacity:0.85;">
      <div style="width:20px; height:20px; flex:none; border-radius:6px; background:#7C6FF0; display:flex; align-items:center; justify-content:center; font-family:'Geist Mono',monospace; font-size:11px; font-weight:500; color:#0B0C0E;">M</div>
      <div style="min-width:0;">
        <div style="font-weight:600; font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">Meridian Design System</div>
        <div style="font-size:11px; color:#6B7280; font-family:'Geist Mono',monospace;">{{ versionLabel }} · 48 tokens</div>
      </div>
    </a>

    <div style="display:flex; flex-direction:column; gap:2px;">
      <a href="Inspector - Tokens.dc.html" style="display:flex; align-items:center; gap:10px; padding:7px 8px; border-radius:6px; color:#9BA1AB; text-decoration:none;" style-hover="background:#1B1D21; color:#E7E9EC;">
        <svg width="14" height="14" viewBox="0 0 14 14"><circle cx="7" cy="7" r="5" fill="none" stroke="currentColor" stroke-width="1.5"></circle><circle cx="7" cy="7" r="2" fill="currentColor"></circle></svg>
        <span style="flex:1;">Tokens</span>
      </a>
      <a href="Inspector - Component Detail.dc.html" style="display:flex; align-items:center; gap:10px; padding:7px 8px; border-radius:6px; color:#9BA1AB; text-decoration:none;" style-hover="background:#1B1D21; color:#E7E9EC;">
        <svg width="14" height="14" viewBox="0 0 14 14"><rect x="2" y="2" width="10" height="10" rx="2" fill="none" stroke="currentColor" stroke-width="1.5"></rect></svg>
        <span style="flex:1;">Components</span>
      </a>
      <a href="Inspector - Graph.dc.html" style="display:flex; align-items:center; gap:10px; padding:7px 8px; border-radius:6px; color:#9BA1AB; text-decoration:none;" style-hover="background:#1B1D21; color:#E7E9EC;">
        <svg width="14" height="14" viewBox="0 0 14 14"><circle cx="3.5" cy="3.5" r="2" fill="none" stroke="currentColor" stroke-width="1.4"></circle><circle cx="10.5" cy="7" r="2" fill="none" stroke="currentColor" stroke-width="1.4"></circle><circle cx="4.5" cy="11" r="2" fill="none" stroke="currentColor" stroke-width="1.4"></circle><path d="M5.3 4.4 L8.7 6.1 M8.6 8 L6 9.9" fill="none" stroke="currentColor" stroke-width="1.2"></path></svg>
        <span style="flex:1;">Graph</span>
      </a>
      <a href="Inspector - Issues.dc.html" style="display:flex; align-items:center; gap:10px; padding:7px 8px; border-radius:6px; color:#9BA1AB; text-decoration:none;" style-hover="background:#1B1D21; color:#E7E9EC;">
        <svg width="14" height="14" viewBox="0 0 14 14"><rect x="2.6" y="2.6" width="8.8" height="8.8" rx="2" fill="none" stroke="currentColor" stroke-width="1.5" transform="rotate(45 7 7)"></rect></svg>
        <span style="flex:1;">Issues</span>
        <span style="font-family:'Geist Mono',monospace; font-size:11px; background:#1B1D21; border:1px solid #34373D; color:#FFB224; border-radius:999px; padding:1px 7px;">31</span>
      </a>
      <a href="#" style="display:flex; align-items:center; gap:10px; padding:7px 8px; border-radius:6px; background:#1B1D21; color:#7C6FF0; font-weight:500; text-decoration:none;" style-hover="background:#1B1D21;">
        <svg width="14" height="14" viewBox="0 0 14 14"><circle cx="7" cy="7" r="5" fill="none" stroke="currentColor" stroke-width="1.5"></circle><path d="M7 4.5 L7 7 L9 8.5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"></path></svg>
        <span style="flex:1;">History</span>
      </a>
    </div>

    <div style="flex:1;"></div>

    <a href="#" style="display:flex; align-items:center; gap:10px; padding:7px 8px; border-radius:6px; color:#6B7280; text-decoration:none;" style-hover="background:#1B1D21; color:#E7E9EC;">
      <span style="font-size:14px; line-height:1;">⚙</span>
      <span>Settings</span>
    </a>
  </nav>

  <!-- ============ MAIN ============ -->
  <main style="flex:1; min-width:0; display:flex; flex-direction:column; background:#0B0C0E;">
    <header style="flex:none; padding:20px 24px 12px; border-bottom:1px solid #26282D; display:flex; align-items:center; gap:12px;">
      <h1 style="margin:0; font-size:20px; font-weight:600; letter-spacing:-0.01em;">History</h1>
      <span style="font-family:'Geist Mono',monospace; font-size:12px; color:#6B7280;">{{ headerCaption }}</span>
    </header>

    <div style="flex:1; overflow-y:auto; padding:24px;">
      <div style="max-width:640px; display:flex; flex-direction:column;">
        <sc-for list="{{ entries }}" as="e" hint-placeholder-count="6">
          <div style="display:flex; gap:16px;">
            <!-- timeline gutter -->
            <div style="display:flex; flex-direction:column; align-items:center; width:12px; flex:none;">
              <span style="width:8px; height:8px; border-radius:50%; background:{{ e.dotColor }}; margin-top:16px; flex:none;"></span>
              <sc-if value="{{ e.hasLine }}"><span style="width:1px; flex:1; background:#26282D;"></span></sc-if>
            </div>

            <!-- card -->
            <div style="flex:1; min-width:0; padding-bottom:12px;">
              <div style="background:#1B1D21; border:1px solid {{ e.borderColor }}; border-radius:8px; overflow:hidden; opacity:{{ e.opacity }};">
                <div style="display:flex; align-items:center; gap:8px; padding:10px 12px;">
                  <sc-if value="{{ e.applied }}"><span style="color:#30A46C; font-size:12px; flex:none;">✓</span></sc-if>
                  <span style="font-size:12px; font-weight:500; flex:1; min-width:0;">{{ e.title }}</span>
                  <span style="font-family:'Geist Mono',monospace; font-size:10px; flex:none; color:{{ e.authorColor }}; border:1px solid {{ e.authorBorder }}; border-radius:4px; padding:1px 6px;">{{ e.author }}</span>
                  <sc-if value="{{ e.rejected }}">
                    <span style="font-family:'Geist Mono',monospace; font-size:10px; flex:none; color:#6B7280; border:1px solid #26282D; border-radius:4px; padding:1px 6px;">rejected</span>
                  </sc-if>
                  <span style="font-family:'Geist Mono',monospace; font-size:10px; flex:none; color:#6B7280; border:1px solid #26282D; border-radius:4px; padding:1px 6px;">{{ e.chipLabel }}</span>
                </div>

                <div style="display:flex; align-items:center; gap:10px; padding:0 12px 10px;">
                  <sc-if value="{{ e.hasVersion }}"><span style="font-family:'Geist Mono',monospace; font-size:11px; color:#9BA1AB;">{{ e.versionText }}</span></sc-if>
                  <sc-if value="{{ e.rejected }}"><span style="font-size:11px; color:#6B7280;">No changes applied</span></sc-if>
                  <span style="font-size:11px; color:#6B7280;">{{ e.time }}</span>
                  <span style="flex:1;"></span>
                  <sc-if value="{{ e.hasExpander }}">
                    <button onClick="{{ e.toggleDiff }}" style="border:none; background:transparent; cursor:pointer; font-family:'Geist Mono',monospace; font-size:11px; color:#7C6FF0; padding:2px 6px; border-radius:4px;" style-hover="background:#26282D;">{{ e.expandLabel }}</button>
                  </sc-if>
                  <sc-if value="{{ e.hasUndo }}">
                    <button onClick="{{ e.undo }}" style="border:none; background:transparent; cursor:pointer; font-family:'Geist',sans-serif; font-size:11px; color:#9BA1AB; padding:2px 6px; border-radius:4px;" style-hover="background:#26282D; color:#E7E9EC;">Undo</button>
                  </sc-if>
                </div>

                <sc-if value="{{ e.diffOpen }}">
                  <div style="border-top:1px solid #26282D; padding:6px 12px 10px; display:flex; flex-direction:column;">
                    <sc-for list="{{ e.diffRows }}" as="d" hint-placeholder-count="5">
                      <div style="display:flex; align-items:center; gap:8px; padding:4px 0; font-family:'Geist Mono',monospace; font-size:11px;">
                        <span style="color:#6B7280; text-decoration:line-through; width:88px; flex:none;">{{ d.from }}</span>
                        <span style="color:#6B7280;">→</span>
                        <span style="color:#E7E9EC; background:rgba(48,164,108,0.12); border-radius:4px; padding:1px 6px;">{{ d.to }}</span>
                      </div>
                    </sc-for>
                  </div>
                </sc-if>
              </div>
            </div>
          </div>
        </sc-for>
      </div>
    </div>
  </main>

  <!-- ============ CHAT STRIP ============ -->
  <div style="width:48px; flex:none; background:#141518; border-left:1px solid #26282D; display:flex; flex-direction:column; align-items:center; padding-top:12px;">
    <a href="Inspector - Assistant.dc.html" title="Open Assistant" style="width:32px; height:32px; border:none; background:transparent; cursor:pointer; color:#9BA1AB; border-radius:6px; display:flex; align-items:center; justify-content:center; text-decoration:none;" style-hover="background:#1B1D21; color:#E7E9EC;">
      <svg width="16" height="16" viewBox="0 0 16 16"><rect x="2" y="3" width="12" height="9" rx="3" fill="none" stroke="currentColor" stroke-width="1.5"></rect><path d="M6 12 L6 14.5 L9 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"></path></svg>
    </a>
  </div>

  <!-- ============ TOAST ============ -->
  <sc-if value="{{ toastVisible }}" hint-placeholder-val="{{ false }}">
    <div style="position:fixed; bottom:24px; left:50%; transform:translateX(-50%); z-index:60; display:flex; align-items:center; gap:8px; background:#1B1D21; border:1px solid #34373D; border-radius:8px; padding:10px 16px; font-size:12px; color:#E7E9EC; box-shadow:0 8px 24px rgba(0,0,0,0.5); animation:vsToastIn 0.18s ease;">
      <span style="color:#30A46C;">✓</span> <span style="font-family:'Geist Mono',monospace;">{{ toastText }}</span>
    </div>
  </sc-if>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 1440, &quot;height&quot;: 900 }
}">
class Component extends DCLogic {
  state = { undone: false, diffOpen: false, toast: '' };

  componentWillUnmount() { clearTimeout(this._toastT); }

  showToast(text) {
    this.setState({ toast: text });
    clearTimeout(this._toastT);
    this._toastT = setTimeout(() => this.setState({ toast: '' }), 3000);
  }

  renderVals() {
    const st = this.state;
    const authors = {
      user:      { color: '#9BA1AB', border: '#34373D' },
      assistant: { color: '#7C6FF0', border: 'rgba(124,111,240,0.4)' },
      pipeline:  { color: '#6B7280', border: '#26282D' },
    };
    const diffAll = [
      { from: 'blue-500', to: 'color/primary/500' },
      { from: 'blue-600', to: 'color/primary/600' },
      { from: 'blue-700', to: 'color/primary/700' },
      { from: 'gray-100', to: 'color/neutral/100' },
      { from: 'gray-300', to: 'color/neutral/300' },
      { from: 'gray-500', to: 'color/neutral/500' },
      { from: 'gray-700', to: 'color/neutral/700' },
      { from: 'gray-900', to: 'color/neutral/900' },
      { from: 'green-600', to: 'color/success/500' },
      { from: 'amber-500', to: 'color/warning/500' },
      { from: 'red-600', to: 'color/error/500' },
      { from: 'white', to: 'color/surface/base' },
      { from: 'gray-50', to: 'color/surface/raised' },
      { from: 'slate-900', to: 'color/text/primary' },
      { from: 'zinc-600', to: 'color/text/secondary' },
      { from: 'blue-50', to: 'color/primary/50' },
      { from: 'zinc-500', to: 'color/grey/untitled-1' },
      { from: 'zinc-450', to: 'color/grey/untitled-2' },
    ];

    const defs = [
      { title: 'Promote #FFFFFF to color/surface/base', author: 'user', kind: 'patch', version: 'v13 → v14', time: '2 min ago', undoable: true, undone: st.undone },
      { title: 'Rename 18 color tokens', author: 'assistant', kind: 'patch', version: 'v12 → v13', time: '1h ago', expander: true },
      { title: 'Normalize spacing scale to 4px grid', author: 'assistant', kind: 'patch', version: 'v11 → v12', time: '1h ago' },
      { title: 'Round Button corners to 12px', author: 'assistant', kind: 'patch', rejected: true, time: '1h ago' },
      { title: 'Confirm axis size on Button', author: 'user', kind: 'patch', version: 'v10 → v11', time: 'Yesterday' },
      { title: 'Merge 3 grey tokens into color/neutral/500', author: 'user', kind: 'patch', version: 'v9 → v10', time: 'Yesterday' },
      { title: 'Imported stitch-export-checkout.zip, 48 tokens, 12 components', author: 'pipeline', kind: 'import', version: 'creates v1', time: 'Jul 2' },
    ];

    const visible = defs.filter(d => !(d.undone));
    const entries = visible.map((d, i) => {
      const a = authors[d.author];
      const rejected = !!d.rejected;
      const isImport = d.kind === 'import';
      return {
        title: d.title,
        author: d.author,
        authorColor: a.color, authorBorder: a.border,
        chipLabel: d.kind,
        rejected,
        applied: !rejected && !isImport,
        opacity: rejected ? '0.55' : '1',
        borderColor: isImport ? '#26282D' : '#34373D',
        dotColor: rejected ? '#6B7280' : isImport ? '#6B7280' : d.author === 'assistant' ? '#7C6FF0' : '#30A46C',
        hasLine: i < visible.length - 1,
        hasVersion: !!d.version && !rejected,
        versionText: d.version ? (d.version.includes('creates') ? d.version : 'Applied, ' + d.version) : '',
        time: d.time,
        hasUndo: !!d.undoable && !st.undone,
        undo: () => { this.setState({ undone: true }); this.showToast('Patch undone, v14 → v13'); },
        hasExpander: !!d.expander,
        expandLabel: st.diffOpen ? 'Hide diff' : 'Show 18 renames',
        toggleDiff: () => this.setState(s => ({ diffOpen: !s.diffOpen })),
        diffOpen: !!d.expander && st.diffOpen,
        diffRows: diffAll,
      };
    });

    return {
      entries,
      versionLabel: st.undone ? 'v13' : 'v14',
      headerCaption: (st.undone ? 'v13' : 'v14') + ' · 23 patches',
      toastVisible: !!st.toast,
      toastText: st.toast,
    };
  }
}
</script>
</body>
</html>
